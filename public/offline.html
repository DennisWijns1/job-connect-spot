<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HandyMatch - Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #F1F5F9; color: #334155; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    .container { text-align: center; max-width: 360px; }
    .icon { font-size: 64px; margin-bottom: 24px; }
    h1 { font-size: 24px; margin-bottom: 8px; color: #14B8A6; }
    p { font-size: 16px; color: #64748B; margin-bottom: 24px; }
    button { background: #14B8A6; color: white; border: none; padding: 12px 32px; border-radius: 12px; font-size: 16px; cursor: pointer; }
    button:hover { background: #0d9488; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>Geen verbinding</h1>
    <p>Je bent momenteel offline. Controleer je internetverbinding en probeer het opnieuw.</p>
    <button onclick="window.location.reload()">Opnieuw proberen</button>
  </div>
</body>
</html>
